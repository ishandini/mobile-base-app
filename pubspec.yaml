name: flutter_app_template
description: Flutter app template — Clean Architecture, BLoC, injectable, auto_route, Firebase.

publish_to: "none"

version: 1.4.7+20

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  fpdart: ^1.1.1
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  get_it: ^9.2.1
  retrofit: ^4.4.2
  json_annotation: ^4.9.0
  dio: ^5.8.0+1
  talker_dio_logger: ^4.7.1
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.3
  shimmer: ^3.0.0
  shared_preferences: ^2.5.2
  auto_route: ^10.1.2
  collection: ^1.19.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  app_links: ^6.4.0
  flutter_svg: ^2.0.17
  jiffy: ^6.3.2
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  logger: ^2.5.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  dart_date: ^1.4.0
  pretty_dio_logger: ^1.4.0
  crypto: ^3.0.6
  intl:
  requests_inspector: ^4.2.3
  flutter_hooks: ^0.20.5
  injectable: ^2.7.1+4
  freezed_annotation: ^2.4.4
  loader_overlay: ^5.0.0
  top_snackbar_flutter: ^3.1.0
  google_maps_flutter: ^2.10.0
  lottie: ^3.3.1
  photo_view: ^0.15.0
  share_plus: ^10.1.3
  panorama_viewer: ^2.0.7
  webview_flutter: ^4.10.0
  webview_flutter_wkwebview: ^3.0.0
  speech_to_text: ^7.0.0
  flutter_native_splash: ^2.4.7

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.2.5
  firebase_remote_config: ^5.4.0
  cloud_functions: ^5.3.4
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  retrofit_generator: ^9.1.9
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  auto_route_generator: ^10.0.1
  injectable_generator:
  widgetbook: ^3.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/locales/
    - assets/theme/
    - assets/images/
    - assets/json/
    - env/.env.dev
    - env/.env.qa
    - env/.env.prod

  fonts:
    - family: Assistant
      fonts:
        - asset: assets/fonts/Assistant-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Assistant-Light.ttf
          weight: 300
        - asset: assets/fonts/Assistant-Regular.ttf
          weight: 400
        - asset: assets/fonts/Assistant-Medium.ttf
          weight: 500
        - asset: assets/fonts/Assistant-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Assistant-Bold.ttf
          weight: 700
        - asset: assets/fonts/Assistant-ExtraBold.ttf
          weight: 800

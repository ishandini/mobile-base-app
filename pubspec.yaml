name: flutter_app_template
description: Flutter app template — Clean Architecture, BLoC, injectable, auto_route, Firebase.

publish_to: "none"

version: 1.4.7+20

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.9
  equatable: ^2.0.8
  fpdart: ^1.2.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  get_it: ^9.2.1
  retrofit: ^4.9.2
  json_annotation: ^4.12.0
  dio: ^5.9.2
  talker_dio_logger: ^5.1.17
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^6.1.5
  shimmer: ^3.0.0
  shared_preferences: ^2.5.5
  auto_route: ^11.1.0
  collection: ^1.19.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  app_links: ^7.0.0
  flutter_svg: ^2.3.0
  jiffy: ^6.4.5
  flutter_dotenv: ^6.0.1
  geolocator: ^14.0.2
  logger: ^2.7.0
  sqflite: ^2.4.2
  path_provider: ^2.1.6
  path: ^1.9.1
  dart_date: ^1.4.0
  pretty_dio_logger: ^1.4.0
  crypto: ^3.0.7
  intl:
  requests_inspector: ^5.4.0
  flutter_hooks: ^0.21.3+1
  injectable: ^3.0.0
  freezed_annotation: ^3.1.0
  loader_overlay: ^5.0.0
  top_snackbar_flutter: ^3.1.0
  google_maps_flutter: ^2.17.1
  lottie: ^3.3.3
  photo_view: ^0.15.0
  share_plus: ^12.0.2
  panorama_viewer: ^2.0.7
  webview_flutter: ^4.14.0
  webview_flutter_wkwebview: ^3.25.1
  speech_to_text: ^7.4.0
  flutter_native_splash: ^2.4.7

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.0
  firebase_remote_config: ^6.5.3
  cloud_functions: ^6.3.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  retrofit_generator: ^10.2.7
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  auto_route_generator: ^10.5.0
  injectable_generator: ^3.0.2
  widgetbook: ^3.23.0

flutter:
  uses-material-design: true
  assets:
    - assets/locales/
    - assets/theme/
    - assets/images/
    - assets/json/
    - env/.env.dev
    - env/.env.qa
    - env/.env.prod

  fonts:
    - family: Assistant
      fonts:
        - asset: assets/fonts/Assistant-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Assistant-Light.ttf
          weight: 300
        - asset: assets/fonts/Assistant-Regular.ttf
          weight: 400
        - asset: assets/fonts/Assistant-Medium.ttf
          weight: 500
        - asset: assets/fonts/Assistant-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Assistant-Bold.ttf
          weight: 700
        - asset: assets/fonts/Assistant-ExtraBold.ttf
          weight: 800
